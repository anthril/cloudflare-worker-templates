name = "twilio-voice-agent"
main = "src/index.ts"
compatibility_date = "2025-01-06"
compatibility_flags = ["nodejs_compat"]

# Set your Cloudflare account ID (or use CLOUDFLARE_ACCOUNT_ID env var)
# account_id = "your-account-id"

workers_dev = true

# Durable Object for Twilio voice sessions
[[durable_objects.bindings]]
name = "VOICE_SESSION_DO"
class_name = "TwilioVoiceSessionDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TwilioVoiceSessionDO"]

# Vectorize index bindings for product + knowledge base search
# Create with: npx wrangler vectorize create products --dimensions=1536 --metric=cosine
[[vectorize]]
binding = "PRODUCTS_INDEX"
index_name = "products"

# Create with: npx wrangler vectorize create knowledge-base --dimensions=1536 --metric=cosine
[[vectorize]]
binding = "KB_INDEX"
index_name = "knowledge-base"

# KV namespace for full product data (dimensions, weight, attributes)
# Create with: npx wrangler kv namespace create PRODUCT_DATA
[[kv_namespaces]]
binding = "PRODUCT_DATA"
id = "your-kv-namespace-id"

# Analytics Engine binding for logging worker analytics
[[analytics_engine_datasets]]
binding = "ANALYTICS"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
ENVIRONMENT = "production"
OPENAI_REALTIME_MODEL = "gpt-4o-realtime-preview-2025-06-03"
MAX_CALL_DURATION_MINUTES = "30"

# Agent configuration (override defaults from src/config/agentConfig.ts)
# COMPANY_NAME = "Your Company"
# AGENT_NAME = "Alex"
# WAREHOUSE_LOCATION = "Main Warehouse"
# HIGH_VALUE_THRESHOLD = "5000"
# TIMEZONE = "America/New_York"
# LOCALE = "en-US"
# DEFAULT_COUNTRY = "US"

# HubSpot Configuration — get these from your HubSpot account
# HUBSPOT_PIPELINE_ID = "your-pipeline-id"
# HUBSPOT_DEAL_STAGE_ID = "your-deal-stage-id"
# HUBSPOT_OWNER_ID = "your-owner-id"

# Shipping API (optional — replace with your shipping provider)
# SHIPPING_API_URL = "https://your-shipping-api.com/quote"

# Secrets (set via: npx wrangler secret put SECRET_NAME):
# OPENAI_API_KEY          - OpenAI API key (required)
# HUBSPOT_API_KEY         - HubSpot private app API key
# WOOCOMMERCE_KEY         - WooCommerce REST API consumer key
# WOOCOMMERCE_SECRET      - WooCommerce REST API consumer secret
# SHIPPING_API_KEY        - Your shipping provider API key (optional)
# SLACK_ACCESS_TOKEN      - Slack Bot OAuth token (optional)
# SLACK_CHAT_REQUEST_CHANNEL - Slack channel for transfer notifications (optional)
# SLACK_MENTION_USER_ID   - Slack user ID to mention on transfers (optional)
