name = "woocommerce-product-sync"
main = "src/index.ts"
compatibility_date = "2025-01-06"
compatibility_flags = ["nodejs_compat"]

# Set your Cloudflare account ID (or use CLOUDFLARE_ACCOUNT_ID env var)
# account_id = "your-account-id"

workers_dev = true

# Vectorize index for product embeddings
# Create with: npx wrangler vectorize create products --dimensions=1536 --metric=cosine
[[vectorize]]
binding = "PRODUCTS_INDEX"
index_name = "products"

# KV namespace for full product data (auto-provisioned on first deploy)
[[kv_namespaces]]
binding = "PRODUCT_DATA"

# Queue for webhook-driven product sync
# Create with: npx wrangler queues create woocommerce-product-sync
[[queues.producers]]
binding = "PRODUCT_SYNC_QUEUE"
queue = "woocommerce-product-sync"

# This worker also consumes from the same queue
[[queues.consumers]]
queue = "woocommerce-product-sync"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "woocommerce-product-sync-dlq"

# Weekly product sync schedule — acts as a safety net / reconciliation
# Default: Saturday 18:00 UTC
[triggers]
crons = ["0 18 * * 6"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[vars]
ENVIRONMENT = "production"
WOOCOMMERCE_URL = "https://your-store.com"

# Required secrets — deploy will fail if these are not set
# Set via: npx wrangler secret put SECRET_NAME
[secrets]
required = ["OPENAI_API_KEY", "WOOCOMMERCE_KEY", "WOOCOMMERCE_SECRET"]

# Optional secrets:
# SYNC_AUTH_TOKEN              - Bearer token for /sync-products and /validate endpoints
#                                Generate with: openssl rand -hex 32
# WOOCOMMERCE_WEBHOOK_SECRET   - HMAC-SHA256 secret for verifying WooCommerce webhooks
#                                Must match the secret set in WooCommerce Admin > Webhooks
